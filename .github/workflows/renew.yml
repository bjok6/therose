name: Auto-Renew-Rose

on:
  workflow_dispatch:          # 给 Cloudflare Worker 触发用

jobs:
  Renew-Rose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk \
            libnss3 \
            libgbm1 \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libx11-xcb1 \
            libxcb-dri3-0

      - name: 🐍 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

     # - name: 🌐 设置 sing-box 代理转发
       # continue-on-error: true
       #   NODE_LINK: ${{ secrets.NODE_LINK }}
      #  run: |
        #  if [ -n "$NODE_LINK" ]; then
        #    bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
       #   else
        #    echo "未配置 NODE_LINK，跳过代理设置"
        #  fi

      - name: 🚀 运行续期脚本
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          COOKIE_VALUE: ${{ secrets.COOKIE_VALUE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python3 app.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=20 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 5 ]; then
              echo "删除旧运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
