# TheRose 自动续期 - GitHub Actions 工作流
# 使用方法：
# 1. 新建仓库，放入 renew_therose.py 和本文件
# 2. 将本文件放到 .github/workflows/renew_therose.yml
# 3. 在仓库 Settings → Secrets and variables → Actions 中添加：
#    EMAIL, PASSWORD, TG_BOT_TOKEN, TG_CHAT_ID（后两个可选）
# 4. 可在 Actions 页手动 Run workflow 测试

name: Renew TheRose

on:
  # 定时任务（UTC 时间）
  # 默认每天 02:00 UTC ≈ 北京时间 10:00
  schedule:
    - cron: "0 2 * * *"
  # 允许在 GitHub 网页上手动触发
  workflow_dispatch:

concurrency:
  group: renew-therose
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            libgtk-3-0 \
            libxss1 \
            libasound2t64 \
            libnss3 \
            libgbm1 \
            fonts-liberation

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests

      - name: Install Chrome (via SeleniumBase)
        run: |
          sbase get chromedriver
          # 若系统无 Chrome，用 SeleniumBase 安装 Chromium
          sbase get chromium || true

      - name: Run renewal script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 无图形界面时用虚拟显示器跑 headed 浏览器（UC / Turnstile 需要）
          DISPLAY: ":99"
        run: |
          # 脚本使用 headless=False + uc_gui_click_captcha，必须配合 Xvfb
          xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            python renew_therose.py

      - name: Upload screenshots on failure / result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-screenshots-${{ github.run_id }}
          path: |
            *.png
          if-no-files-found: ignore
          retention-days: 7
