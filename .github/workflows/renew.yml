# TheRose 自动续期 - GitHub Actions 工作流
# 使用方法：
# 1. 仓库放入 renew_therose.py、requirements.txt
# 2. 本文件放到 .github/workflows/renew_therose.yml
# 3. Secrets:
#    必填: EMAIL, PASSWORD
#    推荐: PROXY  （例如 http://user:pass@host:port 或 socks5://user:pass@host:port）
#    可选: TG_BOT_TOKEN, TG_CHAT_ID
#    也可拆分: PROXY_HOST, PROXY_PORT, PROXY_USER, PROXY_PASS, PROXY_SCHEME
# 4. Actions 页手动 Run workflow 测试

name: Renew TheRose

on:
  schedule:
    # 每天 02:00 UTC ≈ 北京时间 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: renew-therose
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            xdotool \
            scrot \
            libgtk-3-0 \
            libxss1 \
            libasound2t64 \
            libnss3 \
            libgbm1 \
            fonts-liberation \
            python3-tk \
            python3-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # uc_gui_click_captcha 在 Xvfb 下需要 pyautogui
          pip install pyautogui Pillow

      - name: Install Chrome (via SeleniumBase)
        run: |
          sbase get chromedriver
          sbase get chromium || true

      - name: Run renewal script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 推荐整条写入 PROXY secret
          PROXY: ${{ secrets.PROXY }}
          # 或拆分写入（PROXY 为空时生效）
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          PROXY_SCHEME: ${{ secrets.PROXY_SCHEME }}
          DISPLAY: ":99"
        run: |
          xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            python renew_therose.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: renewal-debug-${{ github.run_id }}
          path: |
            *.png
            *.html
          if-no-files-found: ignore
          retention-days: 7
